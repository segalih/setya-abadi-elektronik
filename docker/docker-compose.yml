version: '3.8'

services:

  # Laravel API
  app:
    build:
      context: ../
      dockerfile: docker/api/Dockerfile
    container_name: setya-api
    restart: always
    working_dir: /var/www
    env_file:
      - api.env # Loads all variables directly into the container
    volumes:
      - ../apps/api:/var/www
      - ${EXTERNAL_STORAGE_PATH:-./storage_data}/api:/var/www/storage
    extra_hosts:
      - "host.containers.internal:host-gateway"
    networks:
      - setya-network

  # Nginx for API
  nginx-api:
    image: nginx:stable-alpine
    container_name: setya-nginx-api
    restart: always
    ports:
      - "8000:80"
    volumes:
      - ../apps/api:/var/www
      - ./api/nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - setya-network

  # Notification Service (Node.js)
  notification:
    build:
      context: ../
      dockerfile: docker/notification-service/Dockerfile
    container_name: setya-notification
    restart: always
    ports:
      - "3001:3001"
    env_file:
      - notification.env
    volumes:
      - ../apps/notification-service:/app
      - ${EXTERNAL_STORAGE_PATH:-./storage_data}/baileys:/app/auth_info_baileys
    networks:
      - setya-network

  # Web Frontend
  web:
    build:
      context: ../
      dockerfile: docker/web/Dockerfile
    container_name: setya-web
    restart: always
    ports:
      - "3000:80"
    env_file:
      - web.env
    networks:
      - setya-network

networks:
  setya-network:
    driver: bridge

