version: '3.8'

services:
  # Laravel API (PHP-FPM)
  app:
    build:
      context: ../
      dockerfile: docker/api/Dockerfile
    container_name: setya-api
    restart: unless-stopped
    env_file:
      - api.env
    volumes:
      - api_storage:/var/www/storage
    networks:
      - setya-network

  # Nginx for API
  nginx-api:
    image: nginx:stable-alpine
    container_name: setya-nginx-api
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - api_storage:/var/www/storage:ro
      - ./api/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - setya-network

  # Laravel Queue Worker
  queue:
    build:
      context: ../
      dockerfile: docker/api/Dockerfile
    container_name: setya-queue
    restart: unless-stopped
    env_file:
      - api.env
    volumes:
      - api_storage:/var/www/storage
    command: php artisan queue:work --sleep=3 --tries=3 --max-time=3600
    networks:
      - setya-network

  # Notification Service (Node.js)
  notification:
    build:
      context: ../
      dockerfile: docker/notification-service/Dockerfile
    container_name: setya-notification
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file:
      - notification.env
    volumes:
      - baileys_auth:/app/auth_info_baileys
    networks:
      - setya-network

  # Web Frontend (Nginx static)
  web:
    build:
      context: ../
      dockerfile: docker/web/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000/api}
        VITE_MIDTRANS_CLIENT_KEY: ${VITE_MIDTRANS_CLIENT_KEY:-Mid-client-TvoAzMIy6duIywlA}
    container_name: setya-web
    restart: unless-stopped
    ports:
      - "3000:80"
    networks:
      - setya-network

networks:
  setya-network:
    driver: bridge

volumes:
  api_storage:
  baileys_auth:
